version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: iot-parts-db
    environment:
      POSTGRES_DB: iot_parts_management
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - iot-parts-network

  # Redis for caching (optional)
  redis:
    image: redis:7-alpine
    container_name: iot-parts-redis
    ports:
      - "6379:6379"
    networks:
      - iot-parts-network

  # Main Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: iot-parts-app
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/iot_parts_management
      - NEXTAUTH_URL=http://localhost:3000
      - NEXTAUTH_SECRET=your-secret-key-here
    ports:
      - "3000:3000"
    depends_on:
      - postgres
      - redis
    networks:
      - iot-parts-network
    volumes:
      - ./uploads:/app/uploads

volumes:
  postgres_data:

networks:
  iot-parts-network:
    driver: bridge